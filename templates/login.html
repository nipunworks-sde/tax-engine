<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaxEase — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">₹</div>
      <h1>TaxEase</h1>
    </div>
    <p class="login-subtitle">India's Smart Tax Calculator</p>

    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="login-desc">Sign in to calculate your taxes</p>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <div class="demo-box">
        <p class="demo-title">🔐 Demo Credentials</p>
        <p>Email: nipun@gmail.com</p>
        <p>Password: 123456</p>
      </div>

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@gmail.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary">Sign In →</button>
      </form>
    </div>
    <p class="footer-note">Built with Python Flask + JavaScript</p>
  </div>
</body>
</html>
